<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Year Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --night-purple: #1a0d2e;
      --deep-rose: #3b0f40;
      --soft-glow: #bb86fc;
      --warm-rose: #e6b7c8;
      --text-main: #f8fafc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Fira Code', monospace;
      font-size: clamp(1.2rem, 4vw, 2.5rem);
      line-height: 1.4;
      letter-spacing: 0.02em;
      background: var(--night-purple);
      color: var(--text-main);
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    #backgroundCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .moon {
      position: fixed;
      top: 20%;
      right: 10%;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(224, 231, 255, 0.5);
      z-index: 2;
      transform: translateY(0);
      box-shadow: 0 0 60px rgba(187, 134, 252, 0.7), 0 0 120px rgba(187, 134, 252, 0.4);
      animation: moonFloat 12s infinite ease-in-out;
    }

    @keyframes moonFloat {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-5px) translateX(5px); }
    }

    .main-card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 420px;
      max-width: 90vw;
      max-height: 580px;
      height: auto;
      min-height: 500px;
      border-radius: 24px;
      border: 5px solid var(--soft-glow);
      background: linear-gradient(145deg, var(--night-purple), var(--deep-rose));
      box-shadow: 0 35px 70px rgba(0, 0, 0, 0.7),
        inset 0 0 25px rgba(187, 134, 252, 0.25);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(25px, 6vw, 40px);
      transition: transform 0.3s ease;
      overflow: hidden;
      position: relative;
    }

    @media (max-width: 768px) {
      .main-card {
        max-width: 95vw;
        max-height: 85vh;
        min-height: auto;
        padding: clamp(20px, 5vw, 35px);
      }
    }

    .main-card:hover {
      transform: translate(-50%, -50%) translateY(-12px) scale(1.015) !important;
    }

    .sticker {
      width: clamp(120px, 35vw, 180px);
      height: clamp(120px, 35vw, 180px);
      object-fit: cover;
      border-radius: 16px;
      display: block;
      margin: 0 auto clamp(15px, 4vw, 25px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    #timer {
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      font-weight: 700;
      color: var(--soft-glow);
      text-align: center;
      margin: clamp(15px, 3vw, 20px) 0;
      text-shadow: 0 0 20px var(--soft-glow);
    }

    .glow {
      animation: glow 0.8s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 20px var(--soft-glow);
      }
      to {
        text-shadow: 0 0 35px var(--soft-glow), 0 0 50px var(--soft-glow);
      }
    }

    p {
      color: var(--warm-rose);
      font-size: clamp(1.2rem, 3.2vw, 1.7rem);
      text-align: center;
      margin: clamp(20px, 5vw, 30px) 0;
      max-width: 90%;
    }

    .curtain-left,
    .curtain-right {
      position: fixed;
      top: 0;
      width: 0;
      height: 100vh;
      background: black;
      z-index: 1000;
      display: none;
    }

    .curtain-left {
      left: 0;
    }

    .curtain-right {
      right: 0;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(187,134,252,0.4) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 11;
    }

    #testButton {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 20;
      background: var(--soft-glow);
      color: var(--night-purple);
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-family: 'Fira Code', monospace;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(187, 134, 252, 0.4);
      transition: all 0.3s ease;
    }

    #testButton:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(187, 134, 252, 0.6);
    }
  </style>
</head>
<body>
  <canvas id="backgroundCanvas"></canvas>
  <div class="moon"></div>
  <canvas id="canvas"></canvas>
  <div class="main-card" id="mainCard">
    <img
      src="https://img-16.stickers.cloud/packs/f8e0656d-e616-4bac-9cc8-fcf323925fec/webp/animated/f547870a-740d-4f28-a5b5-cb31fb6de5a5.webp"
      class="sticker"
      alt="Animated sticker"
    />
    <div id="timer">00d 00h 00m 00s</div>
    <p>Waiting for our moment together ❤️</p>
  </div>
  <div class="curtain-left" id="curtainLeft"></div>
  <div class="curtain-right" id="curtainRight"></div>
  

  <script>
    // Background stars canvas
    const backgroundCanvas = document.getElementById('backgroundCanvas');
    const bgCtx = backgroundCanvas.getContext('2d');
    let backgroundStars = [];
    const starCount = 200;

    function resizeBackgroundCanvas() {
      backgroundCanvas.width = window.innerWidth;
      backgroundCanvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeBackgroundCanvas);
    resizeBackgroundCanvas();

    // Initialize background stars
    function initBackgroundStars() {
      backgroundStars = [];
      for (let i = 0; i < starCount; i++) {
        backgroundStars.push({
          x: Math.random() * backgroundCanvas.width,
          y: Math.random() * backgroundCanvas.height,
          size: Math.random() * 2 + 0.5,
          opacity: Math.random() * 0.8 + 0.2,
          twinkleSpeed: Math.random() * 0.02 + 0.01,
          twinklePhase: Math.random() * Math.PI * 2
        });
      }
    }

    function drawBackgroundStars() {
      bgCtx.clearRect(0, 0, backgroundCanvas.width, backgroundCanvas.height);
      for (const star of backgroundStars) {
        const currentOpacity = star.opacity + Math.sin(Date.now() * star.twinkleSpeed + star.twinklePhase) * 0.2;
        bgCtx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, Math.min(1, currentOpacity))})`;
        bgCtx.beginPath();
        bgCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        bgCtx.fill();
      }
    }

    function animateBackgroundStars() {
      drawBackgroundStars();
      requestAnimationFrame(animateBackgroundStars);
    }

    initBackgroundStars();
    animateBackgroundStars();

    // Canvas trails with star particles
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const maxParticles = 50;
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let animationFrameId;
    let time = 0;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Draw a star shape
    function drawStar(x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        ctx.lineTo(Math.cos((18 + i * 72) / 180 * Math.PI) * size, 
                   -Math.sin((18 + i * 72) / 180 * Math.PI) * size);
        ctx.lineTo(Math.cos((54 + i * 72) / 180 * Math.PI) * (size / 2), 
                   -Math.sin((54 + i * 72) / 180 * Math.PI) * (size / 2));
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function addParticle(x, y) {
      if (particles.length >= maxParticles) {
        particles.shift();
      }
      particles.push({
        x: x,
        y: y,
        life: 1,
        decay: 0.008,
        size: 2,
        sparkle: Math.random() * 0.5 + 0.5,
        baseX: x,
        timeOffset: Math.random() * Math.PI * 2
      });
    }

    function updateParticles() {
      time += 0.01;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.life -= p.decay;
        if (p.life <= 0) {
          particles.splice(i, 1);
          i--;
        }
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of particles) {
        const oscillation = Math.sin(time + p.timeOffset) * 5;
        const currentX = p.baseX + oscillation;
        const sparkleOpacity = p.sparkle * p.life * 0.5;
        ctx.fillStyle = `rgba(187, 134, 252, ${sparkleOpacity})`;
        ctx.shadowColor = `rgba(187, 134, 252, ${sparkleOpacity * 0.8})`;
        ctx.shadowBlur = 8;
        drawStar(currentX, p.y, p.size);
        ctx.shadowBlur = 0;
      }
    }

    function animate() {
      updateParticles();
      drawParticles();
      animationFrameId = requestAnimationFrame(animate);
    }

    animate();

    // Mouse and touch events for particles
    function handleMove(e) {
      mouseX = e.clientX;
      mouseY = e.clientY;
      addParticle(mouseX, mouseY);
    }

    function handleTouchMove(e) {
      e.preventDefault();
      const touch = e.touches[0];
      mouseX = touch.clientX;
      mouseY = touch.clientY;
      addParticle(mouseX, mouseY);
    }

    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('touchmove', handleTouchMove, { passive: false });

    // Parallax moon with scroll
    window.addEventListener('scroll', () => {
      const moon = document.querySelector('.moon');
      const scrollY = window.scrollY;
      const oscillation = Math.sin(Date.now() * 0.0005) * 5;
      moon.style.transform = `translateY(${-20 + scrollY * 0.1}px) translateX(${oscillation}px)`;
    });

   // TARGET: New Year 2026 at IST midnight
// IMPORTANT: No timezone offset here because we convert NOW to IST manually
const targetDate = new Date('2026-01-01T00:00:00');

const timerElement = document.getElementById('timer');
const mainCard = document.getElementById('mainCard');
const curtainLeft = document.getElementById('curtainLeft');
const curtainRight = document.getElementById('curtainRight');
const testButton = document.getElementById('testButton');

function updateCountdown() {
  // Force current time to IST
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const istNow = new Date(utc + 330 * 60000); // IST = UTC + 5:30

  const diff = targetDate.getTime() - istNow.getTime();

  if (diff <= 0) {
    timerElement.textContent = '00d 00h 00m 00s';
    timerElement.classList.remove('glow');
    performCurtainAnimation();
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  timerElement.textContent =
    `${String(days).padStart(2, '0')}d ` +
    `${String(hours).padStart(2, '0')}h ` +
    `${String(minutes).padStart(2, '0')}m ` +
    `${String(seconds).padStart(2, '0')}s`;

  if (seconds % 2 === 0) {
    timerElement.classList.add('glow');
  } else {
    timerElement.classList.remove('glow');
  }
}

const countdownInterval = setInterval(updateCountdown, 1000);
updateCountdown();


    // Curtain animation
    function performCurtainAnimation() {
      curtainLeft.style.display = 'block';
      curtainRight.style.display = 'block';

      curtainLeft.animate(
        [
          { width: '0vw' },
          { width: '100vw' }
        ],
        {
          duration: 1200,
          easing: 'ease'
        }
      );

      curtainRight.animate(
        [
          { width: '0vw' },
          { width: '100vw' }
        ],
        {
          duration: 1200,
          easing: 'ease'
        }
      );

      setTimeout(() => {
        window.location.href = 'timeline.html';
      }, 1200);
    }

    // Ripple effect for mobile touch on card
    mainCard.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      const x = touch.clientX;
      const y = touch.clientY;

      const ripple = document.createElement('div');
      ripple.classList.add('ripple');
      ripple.style.left = `${x}px`;
      ripple.style.top = `${y}px`;
      ripple.style.width = '0px';
      ripple.style.height = '0px';
      document.body.appendChild(ripple);

      ripple.animate(
        [
          { width: '0px', height: '0px', opacity: 1 },
          { width: '120px', height: '120px', opacity: 0 }
        ],
        {
          duration: 600,
          easing: 'ease-out'
        }
      );

      setTimeout(() => {
        ripple.remove();
      }, 600);
    });
  </script>
</body>
</html>
